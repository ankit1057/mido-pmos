# pmbootstrap.cfg — pre-seeded configuration for mido builds
# Copy this to ~/.config/pmbootstrap.cfg inside the container.
# Adjust paths as needed.

[pmbootstrap]
aports = /home/pmos/pmaports
config_path = /home/pmos/.config/pmbootstrap.cfg
is_default_channel = False
jobs = 4
log = /home/pmos/.local/var/pmbootstrap/log.txt
mirror_alpine = https://dl-cdn.alpinelinux.org/alpine/
mirrors_postmarketos = https://mirror.postmarketos.org/postmarketos/
timestamp_based_rebuild = True
work = /home/pmos/.local/var/pmbootstrap

[pmbootstrap.targets.0]
device = qcom-msm8953
extra_packages = postmarketos-ui-phosh,postmarketos-ui-sxmo-de-sway,postmarketos-ui-xfce4
hostname = mido
kernel = linux-postmarketos-qcom-msm8953
locale = en_US.UTF-8
user = pmos
ui = none
