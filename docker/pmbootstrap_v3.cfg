# pmbootstrap_v3.cfg — pre-seeded v3 configuration for mido builds
# Copy this to ~/.config/pmbootstrap_v3.cfg inside the container.

[pmbootstrap]
aports = /home/pmos/pmaports
auto_zap_misconfigured_chroots = yes
channel = edge
device = qcom-msm8953
is_default_channel = False
jobs = 4
log = /home/pmos/.local/var/pmbootstrap/log.txt
mirrors.alpine = https://dl-cdn.alpinelinux.org/alpine/
mirrors.pmaports = https://mirror.postmarketos.org/postmarketos/
sudo_timer = True
timezone = Etc/UTC
ui = none
user = pmos
work = /home/pmos/.local/var/pmbootstrap

[providers]

[mirrors]
